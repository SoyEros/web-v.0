<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - WebHost Pro</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <h1>WebHost Pro</h1>
  <nav>
    <a href="../index.html">Inicio</a>
    <a href="servicios.html">Servicios</a>
    <a href="contacto.html">Contacto</a>
  </nav>
</header>

<section class="hero">
  <h2>Contacto</h2>
  <p>Escribime directo por WhatsApp 👇</p>
</section>

<section class="contacto">
  <form onsubmit="enviarWhatsApp(event)">
    
    <input type="text" id="nombre" placeholder="Tu nombre" required><br><br>
    
    <input type="email" id="email" placeholder="Tu email" required><br><br>
    
    <textarea id="mensaje" placeholder="¿Qué necesitás?" rows="5" required></textarea><br><br>
    
    <button type="submit">Enviar por WhatsApp</button>

  </form>
</section>

<footer>
  <p>© 2026 WebHost Pro</p>
</footer>

<script>
function enviarWhatsApp(e) {
  e.preventDefault();

  let nombre = document.getElementById("nombre").value;
  let email = document.getElementById("email").value;
  let mensaje = document.getElementById("mensaje").value;

  let texto = `Hola, soy ${nombre}%0AEmail: ${email}%0A%0AMensaje: ${mensaje}`;

  let numero = "+54911XXXXXXXX";

  let url = `https://wa.me/${numero}?text=${texto}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
